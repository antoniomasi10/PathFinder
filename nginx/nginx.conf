upstream pathfinder_backend {
    # ip_hash provides sticky sessions so WebSocket upgrade requests
    # always reach the same backend instance that handled the initial handshake.
    ip_hash;
    server backend1:4000;
    server backend2:4000;
    # Add more instances as needed:
    # server backend3:4000;
}

server {
    listen 80;
    server_name api.pathfinder.example.com;

    location / {
        proxy_pass http://pathfinder_backend;

        # Required for WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive (24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
