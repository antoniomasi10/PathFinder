version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pathfinder-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pathfinder
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: pathfinder
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
