services:
  - type: web
    name: pathfinder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pathfinder-db
          property: connectionString

databases:
  - name: pathfinder-db
    plan: free
    databaseName: pathfinder
    user: pathfinder
